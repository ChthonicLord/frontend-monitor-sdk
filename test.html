<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前端监控 SDK 测试</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 50px auto; padding: 0 20px; }
    button { margin: 5px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 6px; overflow-x: auto; }
    .section { margin: 30px 0; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; }
    .section h3 { margin-top: 0; }
  </style>
</head>
<body>
  <h1>前端监控 SDK 测试</h1>
  <p>打开 F12 控制台查看 SDK 输出</p>

  <div class="section">
    <h3>手动埋点测试</h3>
    <button id="track-btn">track('button_click')</button>
    <button id="track-custom-btn">track('purchase', { amount: 99 })</button>
  </div>

  <div class="section">
    <h3>错误采集测试</h3>
    <button id="error-btn">抛出 JS 错误</button>
    <button id="promise-error-btn">Promise 错误</button>
  </div>

  <div class="section">
    <h3>用户信息</h3>
    <button id="set-user-btn">setUser({ userId: 'u001' })</button>
  </div>

  <div class="section">
    <h3>SPA 路由（PV 上报）</h3>
    <button id="pv-btn">trackPageView('/about')</button>
  </div>

  <div class="section">
    <h3>Monitor 实例状态</h3>
    <pre id="monitor-info">加载中...</pre>
  </div>

  <!-- SDK 引入 -->
  <script src="http://47.100.77.39:8080/monitor/monitor.umd.js"></script>

  <script>
    // 手动初始化（比 data-* 属性更可靠）
    const monitor = FrontendMonitor.createMonitor({
      appId: 'test-app',
      reportUrl: 'http://47.100.77.39:8080/api/report',
      debug: true,
      sampleRate: 1,
      enablePerformance: true,
      enableBehavior: true,
      enableResource: true,
    });

    // 显示实例状态
    const info = document.getElementById('monitor-info');
    info.textContent = JSON.stringify({
      status: 'SDK 已初始化',
      hasTrack: typeof monitor.track === 'function',
      hasSetUser: typeof monitor.setUser === 'function',
      hasTrackPageView: typeof monitor.trackPageView === 'function',
      hasStop: typeof monitor.stop === 'function',
    }, null, 2);

    // ---- 手动埋点 ----
    document.getElementById('track-btn').addEventListener('click', () => {
      monitor.track('button_click', { timestamp: Date.now() });
    });

    document.getElementById('track-custom-btn').addEventListener('click', () => {
      monitor.track('purchase', { amount: 99, currency: 'CNY' });
    });

    // ---- 错误采集 ----
    document.getElementById('error-btn').addEventListener('click', () => {
      throw new Error('这是一个测试 JS 错误');
    });

    document.getElementById('promise-error-btn').addEventListener('click', () => {
      Promise.reject(new Error('这是一个 Promise 未捕获错误'));
    });

    // ---- 用户信息 ----
    document.getElementById('set-user-btn').addEventListener('click', () => {
      monitor.setUser({ userId: 'u001', userName: '测试用户' });
      console.log('[测试] 已设置用户信息');
    });

    // ---- PV 上报 ----
    document.getElementById('pv-btn').addEventListener('click', () => {
      monitor.trackPageView('/about');
      console.log('[测试] 已上报 PV: /about');
    });
  </script>
</body>
</html>
